<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Community Picks — Summer Reading Challenge 2026 | Westport Library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;600;700;900&family=Open+Sans:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8VJ1NHYPKQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8VJ1NHYPKQ');

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #00a8a8;
      --teal-dark:  #0c6980;
      --bg:         #bd2f92;
      --bg-dark:    #9e2079;
      --mango:      #f7c948;
      --mint:       #a8dde8;
      --strawberry: #f4a0c0;
      --vanilla:    #f5e8d0;
      --text:       #ffffff;
      --muted:      rgba(255,255,255,0.6);
      --faint:      rgba(255,255,255,0.25);
      --header-h:   56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Open Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a { color: inherit; text-decoration: none; }

    /* ─── HEADER ─────────────────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: calc(var(--header-h) + env(safe-area-inset-top, 0px));
      background: var(--teal-dark);
      display: flex;
      align-items: flex-end;
      padding-bottom: 8px;
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: max(20px, env(safe-area-inset-left, 0px));
      padding-right: max(20px, env(safe-area-inset-right, 0px));
      gap: 14px;
      z-index: 300;
      border-bottom: 2px solid rgba(0,0,0,0.2);
    }

    /* ─── WORDMARK AS BUTTON ─────────────────────────────────────── */
    .header__wordmark {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      line-height: 1;
      flex-shrink: 0;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }

    .header__wordmark span {
      display: block;
      font-weight: 400;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1px;
    }

    /* ─── HOME SCREEN ────────────────────────────────────────────── */
    .home-screen {
      position: fixed;
      top: calc(var(--header-h) + env(safe-area-inset-top, 0px));
      left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .home-screen__top {
      text-align: center;
      flex-shrink: 0;
      padding: clamp(10px, 1.5vh, 32px) 24px clamp(6px, 1vh, 16px);
    }

    .home-screen__eyebrow {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    .home-screen__headline {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 6vw, 4rem);
      line-height: 1.0;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .home-screen__tagline {
      font-size: clamp(0.78rem, 1.6vw, 0.95rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ─── BOOK SHELF ────────────────────────────────────────────── */
    .rolodex-wrap {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .rolodex-label {
      flex-shrink: 0;
      text-align: center;
      padding: 0 24px clamp(6px, 1.2vh, 16px);
      z-index: 20;
    }

    .rolodex-label__name {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: clamp(0.95rem, 3vw, 2rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 2px;
      min-height: 1.3em;
    }

    .rolodex-label__meta {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mango);
      margin-bottom: 8px;
    }

    .rolodex-label__tap {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }

    .rolodex-label__hint { display: none; }

    .rolodex-stage {
      flex: 1;
      width: 100%;
      min-height: 0;
      position: relative;
      cursor: grab;
      overflow: hidden;
    }

    .rolodex-stage.dragging { cursor: grabbing; }

    /* Shelf surface */
    .shelf-line {
      position: absolute;
      bottom: 18%;
      left: 0; right: 0;
      height: 8px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.2));
      border-radius: 4px;
      z-index: 5;
      pointer-events: none;
    }

    .shelf-shadow {
      position: absolute;
      bottom: calc(18% - 10px);
      left: 0; right: 0;
      height: 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
      pointer-events: none;
      z-index: 4;
    }

    /* Individual book */
    .book {
      position: absolute;
      bottom: calc(18% + 8px);
      transform-origin: center bottom;
      user-select: none;
      -webkit-user-select: none;
      z-index: 3;
      cursor: pointer;
    }

    .book__inner {
      width: 100%;
      height: 100%;
      border-radius: 2px 5px 5px 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      box-shadow:
        inset -6px 0 12px rgba(0,0,0,0.4),
        inset 3px 0 6px rgba(255,255,255,0.15),
        4px 8px 24px rgba(0,0,0,0.55);
    }

    /* Page-edge illusion on right side */
    .book__inner::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 6px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.06) 0px,
        rgba(255,255,255,0.06) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
    }

    /* Spine binding line */
    .book__inner::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: linear-gradient(to right, rgba(0,0,0,0.35), rgba(0,0,0,0.1));
      border-radius: 2px 0 0 2px;
      pointer-events: none;
      z-index: 2;
    }

    /* Spine text for non-active books */
    .book__spine-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'Catamaran', sans-serif;
      font-weight: 800;
      font-size: clamp(0.65rem, 1.2vw, 0.9rem);
      line-height: 1.2;
      color: rgba(0,0,0,0.7);
      padding: 12px 6px;
      text-align: center;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      position: relative;
      z-index: 1;
    }

    /* Active book faces out */
    .book.active .book__inner {
      border-radius: 3px 6px 6px 3px;
      box-shadow:
        -6px 0 0 rgba(0,0,0,0.25),
        inset 4px 0 8px rgba(255,255,255,0.2),
        16px 24px 56px rgba(0,0,0,0.75);
    }

    .book.active .book__spine-text {
      writing-mode: horizontal-tb;
      transform: none;
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      color: rgba(0,0,0,0.85);
      font-weight: 900;
      padding: 20px 16px;
      -webkit-line-clamp: 6;
      line-height: 1.35;
    }

    /* ─── BOOK DESCRIPTION & READ MORE ──────────────────────────── */
    .book-slide__description {
      font-size: clamp(0.82rem, 1.4vw, 0.95rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-top: -4px;
    }

    .book-slide__description-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-slide__description-text.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }

    .book-slide__read-more {
      background: none;
      border: none;
      color: var(--mint);
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 0 0;
      display: inline-block;
    }

    .book-slide__read-more:hover { opacity: 0.8; }

    /* ─── ALSO USED FOR ──────────────────────────────────────────── */
    .book-slide__also {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 4px;
    }

    .book-slide__also strong {
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      display: block;
      margin-bottom: 2px;
      font-family: 'Catamaran', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── MOBILE DESCRIPTION MODAL ───────────────────────────────── */
    .desc-modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      backdrop-filter: blur(4px);
    }

    .desc-modal-backdrop.open { display: block; }

    .desc-modal {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1a1a24;
      border-radius: 16px 16px 0 0;
      padding: 24px 24px 40px;
      z-index: 501;
      max-height: 75vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .desc-modal-backdrop.open .desc-modal {
      transform: translateY(0);
    }

    .desc-modal__handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .desc-modal__title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 6px;
    }

    .desc-modal__author {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    .desc-modal__text {
      font-size: 0.9rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.8);
    }

    .desc-modal__close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Catamaran', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
    }

    .header__sep {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    /* Category dropdown */
    .header__nav {
      position: relative;
      flex: 1;
    }

    .header__nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 6px 12px;
      color: #fff;
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      transition: background 0.15s;
    }

    .header__nav-btn:hover { background: rgba(255,255,255,0.18); }

    .header__nav-btn .chevron {
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .header__nav-btn.open .chevron { transform: rotate(180deg); }

    .header__dropdown {
      position: fixed;
      top: calc(var(--header-h) + env(safe-area-inset-top, 0px) + 4px);
      left: 16px;
      right: 16px;
      max-width: 640px;
      max-height: 60vh;
      overflow-y: auto;
      background: var(--teal-dark);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      z-index: 400;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    .header__dropdown.open { display: block; }

    .header__dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.1s;
      gap: 12px;
    }

    .header__dropdown-item:last-child { border-bottom: none; }
    .header__dropdown-item:hover { background: rgba(255,255,255,0.1); }
    .header__dropdown-item.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
    }

    .header__dropdown-item .di-count {
      font-size: 0.68rem;
      color: var(--faint);
      flex-shrink: 0;
    }

    /* Category progress indicator */
    .header__progress {
      margin-left: auto;
      font-family: 'Catamaran', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      letter-spacing: 0.06em;
    }

    /* ─── MAIN SCROLL CONTAINER ──────────────────────────────────── */
    .scroll-container {
      position: fixed;
      top: calc(var(--header-h) + env(safe-area-inset-top, 0px));
      left: 0; right: 0;
      bottom: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .scroll-container::-webkit-scrollbar { display: none; }

    /* ─── CATEGORY SLIDE ─────────────────────────────────────────── */
    .category-slide {
      height: calc(100vh - var(--header-h) - env(safe-area-inset-top, 0px));
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Gradient background shift per category using ice cream colors */
    .category-slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,0,0,0.18) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── CATEGORY LABEL (inside book info) ─────────────────────── */
    .book-slide__category {
      font-family: 'Catamaran', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }

    /* ─── BOOK STAGE ─────────────────────────────────────────────── */
    .book-stage {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ─── BOOK DOTS (absolute overlay) ──────────────────────────── */
    .book-dots {
      position: absolute;
      bottom: 44px;
      left: 0;
      right: 50%;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 20;
      pointer-events: none;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
      pointer-events: all;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ─── SCROLL HINT (absolute overlay) ────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      opacity: 0.4;
      animation: hint-bob 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes hint-bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(4px); }
    }

    .scroll-hint svg { display: block; }
    .scroll-hint span {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Arrow buttons */
    .stage-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      flex-shrink: 0;
    }

    .stage-arrow:hover { background: rgba(0,0,0,0.65); }
    .stage-arrow[disabled] { opacity: 0.2; pointer-events: none; }
    .stage-arrow--prev { left: 12px; }
    .stage-arrow--next { right: 12px; }

    /* Book viewport (clips the sliding books) */
    .book-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .book-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* ─── SINGLE BOOK CARD ───────────────────────────────────────── */
    .book-slide {
      flex-shrink: 0;
      width: 100%;
      min-width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 100%;
      align-items: stretch;
    }

    .book-slide__cover-wrap {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.12);
    }

    .book-slide__cover {
      height: 100%;
      width: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      padding: 32px 24px;
      filter: drop-shadow(8px 16px 40px rgba(0,0,0,0.55));
    }

    .book-slide__cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      opacity: 0.3;
    }

    .book-slide__info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-self: stretch;
      gap: clamp(12px, 2vh, 24px);
      padding: 0 clamp(32px, 5vw, 80px) 0 clamp(28px, 4vw, 64px);
      min-width: 0;
      min-height: 0;
    }

    .book-slide__stars {
      display: flex;
      gap: 6px;
    }

    .star {
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      line-height: 1;
    }
    .star--filled { color: var(--mango); }
    .star--empty  { color: rgba(255,255,255,0.2); }

    .book-slide__title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 4vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .book-slide__author {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2vw, 1.8rem);
      color: rgba(255,255,255,0.65);
      margin-top: -4px;
    }

    .book-slide__review {
      font-size: clamp(0.95rem, 1.5vw, 1.25rem);
      font-style: italic;
      line-height: 1.85;
      color: rgba(255,255,255,0.82);
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-slide__patron {
      font-family: 'Catamaran', sans-serif;
      font-size: clamp(0.68rem, 0.9vw, 0.88rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }

    .book-slide__catalog {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: clamp(10px, 1.2vh, 16px) clamp(18px, 2vw, 28px);
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: clamp(0.78rem, 1vw, 1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-start;
      margin-top: 4px;
    }

    .book-slide__catalog:hover { background: rgba(0,0,0,0.5); }

    /* ─── PLACEHOLDER SLIDE ──────────────────────────────────────── */
    .placeholder-slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 24px;
    }

    .placeholder-slide__icon { font-size: 2.5rem; opacity: 0.4; }

    .placeholder-slide__text {
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .placeholder-slide__text a {
      color: rgba(255,255,255,0.7);
      text-decoration: underline;
    }

    /* ─── STATUS ─────────────────────────────────────────────────── */
    .status-bar {
      height: calc(100vh - var(--header-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.6);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── MOBILE ADJUSTMENTS ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .book-slide {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .book-slide__cover-wrap {
        height: 42vh;
      }

      .book-slide__cover {
        padding: 20px 40px 12px;
      }

      .book-slide__info {
        padding: 16px 24px 16px;
        gap: 10px;
        justify-content: flex-start;
        overflow-y: auto;
      }

      .book-slide__review { -webkit-line-clamp: 3; }
      .book-slide__title { font-size: clamp(1.2rem, 5.5vw, 1.6rem); }

      /* Keep arrows within the cover area on mobile */
      .stage-arrow {
        top: 21vh;
        transform: none;
      }
      .stage-arrow--prev { left: 6px; }
      .stage-arrow--next { right: 6px; }

      /* Hide dots on mobile — arrows and swipe are sufficient */
      .book-dots { display: none; }

      /* Add bottom padding so borrow button clears the scroll hint */
      .book-slide__info {
        padding-bottom: 56px;
      }

      /* Home screen — compress everything, maximize shelf */
      .home-screen__eyebrow { display: none; }
      .home-screen__headline {
        font-size: clamp(1.4rem, 7vw, 2rem);
        margin-bottom: 0;
      }
      .home-screen__top {
        padding: 8px 16px 4px;
      }
      .rolodex-label {
        padding: 0 16px 4px;
      }
      .rolodex-label__name {
        font-size: clamp(0.9rem, 4vw, 1.2rem);
      }

      .shelf-line,
      .shelf-shadow {
        bottom: 2%;
      }

      .book {
        bottom: calc(2% + 8px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .book-track { transition: none; }
      .scroll-hint { animation: none; }
      .spinner { animation: none; }
    }

    /* ─── DESKTOP DROPDOWN WIDTH ─────────────────────────────────── */
    @media (min-width: 768px) {
      .header__dropdown {
        left: 16px;
        right: auto;
        width: 560px;
        max-width: calc(100vw - 32px);
      }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
<header class="header">
  <button class="header__wordmark" id="homeBtn" aria-label="Go to home screen">
    <span>Westport Library</span>
    Community Picks
  </button>
  <div class="header__sep"></div>
  <div class="header__nav" id="headerNav" style="display:none">
    <button class="header__nav-btn" id="navBtn" aria-haspopup="listbox" aria-expanded="false">
      <span id="navBtnLabel">Jump to category…</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header__dropdown" id="navDropdown" role="listbox"></div>
  </div>
  <div class="header__progress" id="headerProgress" style="display:none"></div>
</header>

<!-- ─── HOME SCREEN ───────────────────────────────────────────────────── -->
<div class="home-screen" id="homeScreen">
  <div class="home-screen__top">
    <div class="home-screen__eyebrow">Summer Reading Challenge 2026</div>
    <h1 class="home-screen__headline">Community<br>Picks</h1>
    <p class="home-screen__tagline">Stuck on a challenge? Browse top-rated books submitted by other readers for ideas.</p>
  </div>
  <div class="rolodex-wrap" id="rolodexWrap">
    <div class="rolodex-label" id="rolodexLabel">
      <div class="rolodex-label__name" id="rolodexName">—</div>
      <div class="rolodex-label__meta" id="rolodexMeta"></div>
      <div class="rolodex-label__tap">Tap book to browse</div>
    </div>
    <div class="rolodex-stage" id="rolodexStage"></div>
  </div>
</div>

<!-- ─── DESCRIPTION MODAL (mobile) ───────────────────────────────────── -->
<div class="desc-modal-backdrop" id="descModalBackdrop">
  <div class="desc-modal" id="descModal">
    <div class="desc-modal__handle"></div>
    <button class="desc-modal__close" id="descModalClose" aria-label="Close">✕</button>
    <div class="desc-modal__title" id="descModalTitle"></div>
    <div class="desc-modal__author" id="descModalAuthor"></div>
    <div class="desc-modal__text" id="descModalText"></div>
  </div>
</div>

<!-- ─── SCROLL CONTAINER ──────────────────────────────────────────────── -->
<div class="scroll-container" id="scrollContainer" style="display:none">
  <div class="status-bar">
    <div class="spinner"></div>
    <span style="font-size:0.85rem">Loading community picks…</span>
  </div>
</div>

<script>
  // ── Utilities ─────────────────────────────────────────────────────────────

  function parseCSVRow(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  }

  function isPublished(val) {
    if (!val) return false;
    return ['TRUE','1','YES'].includes(String(val).trim().toUpperCase());
  }

  function formatDisplayName(n) {
    if (!n) return 'Anonymous';
    const p = n.trim().split(/\s+/);
    return p.length === 1 ? p[0] : p[0] + ' ' + p[p.length-1][0].toUpperCase() + '.';
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function slug(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  function starsHTML(n) {
    let h = '<div class="book-slide__stars" aria-label="'+n+' out of 5 stars">';
    for (let i=1;i<=5;i++) h+='<span class="star '+(i<=n?'star--filled':'star--empty')+'">★</span>';
    return h+'</div>';
  }

  // ── State ─────────────────────────────────────────────────────────────────

  let categoryIndex = 0;   // which category slide is in view
  const slideBookIndex = {}; // categorySlug → current book index

  // ── Build HTML ────────────────────────────────────────────────────────────

  // ── Google Books description cache ───────────────────────────────────────
  const descCache = {};

  async function fetchDescription(isbn, title, author) {
    if (!isbn && !title) return null;
    const cacheKey = isbn || title;
    if (descCache[cacheKey] !== undefined) return descCache[cacheKey];

    const key = 'AIzaSyCi1LSVSow7yElbgEnlFaTre22_0VkR0DA';

    try {
      // First try by ISBN
      if (isbn) {
        const res  = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${encodeURIComponent(isbn)}&maxResults=1&key=${key}`);
        const data = await res.json();
        const desc = data?.items?.[0]?.volumeInfo?.description || null;
        if (desc) {
          descCache[cacheKey] = desc;
          return desc;
        }
      }

      // Fallback: search by title + author
      if (title) {
        const q   = "intitle:" + encodeURIComponent(title) + (author ? "+inauthor:" + encodeURIComponent(author.split(" ").pop()) : "");
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1&key=${key}`);
        const data = await res.json();
        const desc = data?.items?.[0]?.volumeInfo?.description || null;
        descCache[cacheKey] = desc;
        return desc;
      }
    } catch {
      descCache[cacheKey] = null;
    }

    descCache[cacheKey] = null;
    return null;
  }

  // ── Build cross-challenge index: isbn → [categories] ─────────────────────
  function buildIsbnIndex(categories, entriesByCategory) {
    const index = {}; // isbn → Set of category names
    categories.forEach(cat => {
      (entriesByCategory[cat] || []).forEach(row => {
        const isbn = (row[8] || '').trim();
        if (!isbn) return;
        if (!index[isbn]) index[isbn] = new Set();
        index[isbn].add(cat);
      });
    });
    return index;
  }

  function buildBookSlide(row, catName, isbnIndex) {
    const title   = row[4] || '';
    const author  = row[5] || '';
    const stars   = parseInt(row[6],10) || 0;
    const review  = row[7] || '';
    const isbn    = (row[8]||'').trim();
    const catalog = (row[10]||'').trim();
    const patron  = formatDisplayName(row[2]);

    const coverUrl = (row[9] || '').trim();
    // Use stored cover URL, upgrading MC.GIF to LC.GIF for higher res
    const lc = coverUrl ? coverUrl.replace('MC.GIF', 'LC.GIF') : null;
    const mc = lc ? lc.replace('LC.GIF', 'MC.GIF') : null;

    const coverHTML = lc
      ? `<img class="book-slide__cover syndetics-cover" src="${lc}" data-mc="${mc}" alt="${escHtml(title)} cover" loading="lazy"/>`
      : `<div class="book-slide__cover-placeholder">📖</div>`;

    const catalogBtn = catalog
      ? `<a class="book-slide__catalog" href="${escHtml(catalog)}" target="_blank" rel="noopener">Borrow it →</a>`
      : '';

    // Cross-challenge usage
    let alsoHTML = '';
    if (isbn && isbnIndex && isbnIndex[isbn]) {
      const others = [...isbnIndex[isbn]].filter(c => c !== catName);
      if (others.length > 0) {
        alsoHTML = `<div class="book-slide__also">
          <strong>Also used for</strong>
          ${others.map(c => escHtml(c)).join('<br>')}
        </div>`;
      }
    }

    // Description placeholder — will be populated async
    const descId = `desc-${isbn || Math.random().toString(36).slice(2)}`;
    const descHTML = `<div class="book-slide__description" id="${descId}" data-isbn="${escHtml(isbn)}" data-title="${escHtml(title)}" data-author="${escHtml(author)}">
      <div class="book-slide__description-text"></div>
    </div>`;

    return `<article class="book-slide">
      <div class="book-slide__cover-wrap">${coverHTML}</div>
      <div class="book-slide__info">
        <div class="book-slide__category">${escHtml(catName)}</div>
        ${starsHTML(stars)}
        <div class="book-slide__title">${escHtml(title)}</div>
        <div class="book-slide__author">${escHtml(author)}</div>
        ${descHTML}
        <p class="book-slide__review">${escHtml(review)}</p>
        <div class="book-slide__patron">— ${escHtml(patron)}</div>
        ${alsoHTML}
        ${catalogBtn}
      </div>
    </article>`;
  }

  function buildCategorySlide(cat, entries, catIdx, totalCats, isbnIndex) {
    const id      = slug(cat);
    const isLast  = catIdx === totalCats - 1;

    let stageContent;
    if (entries.length === 0) {
      stageContent = `<div class="placeholder-slide">
        <div class="placeholder-slide__icon">🍦</div>
        <div class="placeholder-slide__text">No 4- or 5-star reviews yet for this category.<br>
          <a href="/reading-challenge/submit.html">Be the first to submit one!</a></div>
      </div>`;
    } else {
      const booksHTML = entries.map(r => buildBookSlide(r, cat, isbnIndex)).join('');
      stageContent = `
        <button class="stage-arrow stage-arrow--prev" data-cat="${id}" aria-label="Previous book" disabled>&#8592;</button>
        <div class="book-viewport">
          <div class="book-track" id="track-${id}">${booksHTML}</div>
        </div>
        <button class="stage-arrow stage-arrow--next" data-cat="${id}" aria-label="Next book" ${entries.length<=1?'disabled':''}>&#8594;</button>`;
    }

    const dotsHTML = entries.length > 1
      ? '<div class="book-dots" id="dots-'+id+'">'
        + entries.map((_,i) => `<span class="dot${i===0?' active':''}" data-cat="${id}" data-i="${i}"></span>`).join('')
        + '</div>'
      : '';

    const scrollHint = isLast ? '' : `<div class="scroll-hint">
      <svg width="16" height="10" viewBox="0 0 16 10" fill="none" aria-hidden="true">
        <path d="M1 1l7 7 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Next category</span>
    </div>`;

    return `<section class="category-slide" id="slide-${id}" data-slug="${id}" data-cat-idx="${catIdx}">
      <div class="book-stage">${stageContent}</div>
      ${dotsHTML}
      ${scrollHint}
    </section>`;
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render(categories, entriesByCategory) {
    const container = document.getElementById('scrollContainer');
    const total     = categories.length;

    // Build cross-challenge ISBN index
    const isbnIndex = buildIsbnIndex(categories, entriesByCategory);

    // Build slides
    let html = '';
    categories.forEach((cat, i) => {
      html += buildCategorySlide(cat, entriesByCategory[cat]||[], i, total, isbnIndex);
    });
    container.innerHTML = html;

    // Build dropdown
    const dropdown = document.getElementById('navDropdown');
    dropdown.innerHTML = categories.map((cat, i) => {
      const count = (entriesByCategory[cat]||[]).length;
      return `<div class="header__dropdown-item${i===0?' active':''}"
        role="option" data-cat-idx="${i}" data-slug="${slug(cat)}">
        <span>${escHtml(cat)}</span>
        <span class="di-count">${count > 0 ? count+' review'+(count>1?'s':'') : '—'}</span>
      </div>`;
    }).join('');

    updateHeaderProgress(0, total, categories[0]);
    attachEvents(categories, entriesByCategory, total);
    buildWheel(categories, entriesByCategory);
    showHome();

    // Populate descriptions async — fetch Google Books as slides are viewed
    populateDescriptions();
  }

  // ── Populate descriptions for a specific slide ───────────────────────────

  const populatedSlugs = new Set();

  function populateSlideDescriptions(slideEl) {
    if (!slideEl) return;
    const id = slideEl.id;
    if (populatedSlugs.has(id)) return;
    populatedSlugs.add(id);

    const els = slideEl.querySelectorAll('.book-slide__description');
    // Stagger requests 300ms apart to avoid rate limiting
    els.forEach((el, i) => {
      setTimeout(() => {
        const isbn   = el.dataset.isbn;
        const title  = el.dataset.title;
        const author = el.dataset.author;
        if (!isbn && !title) return;

        fetchDescription(isbn, title, author).then(desc => {
          if (!desc) { el.style.display = 'none'; return; }

          const textEl = el.querySelector('.book-slide__description-text');
          textEl.textContent = desc;

          const btn = document.createElement('button');
          btn.className   = 'book-slide__read-more';
          btn.textContent = 'Read more';
          el.appendChild(btn);

          btn.addEventListener('click', () => {
            if (window.innerWidth < 640) {
              document.getElementById('descModalTitle').textContent  = title;
              document.getElementById('descModalAuthor').textContent = author;
              document.getElementById('descModalText').textContent   = desc;
              document.getElementById('descModalBackdrop').classList.add('open');
            } else {
              const expanded = textEl.classList.toggle('expanded');
              btn.textContent = expanded ? 'Show less' : 'Read more';
            }
          });

          if (window.innerWidth >= 640) {
            setTimeout(() => {
              if (textEl.scrollHeight <= textEl.clientHeight + 2) {
                btn.style.display = 'none';
              }
            }, 500);
          }
        });
      }, i * 300);
    });
  }

  function populateDescriptions() {
    // Populate first slide immediately
    const firstSlide = document.querySelector('.category-slide');
    populateSlideDescriptions(firstSlide);

    // Modal close handlers
    const backdrop = document.getElementById('descModalBackdrop');
    document.getElementById('descModalClose').addEventListener('click', () => {
      backdrop.classList.remove('open');
    });
    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) backdrop.classList.remove('open');
    });
  }

  // ── Events ────────────────────────────────────────────────────────────────

  function attachEvents(categories, entriesByCategory, total) {
    const container = document.getElementById('scrollContainer');
    const navBtn    = document.getElementById('navBtn');
    const navDropdown = document.getElementById('navDropdown');

    // Init book indices and sync arrow states
    categories.forEach(cat => {
      const id = slug(cat);
      const entries = entriesByCategory[cat] || [];
      slideBookIndex[id] = 0;
      if (entries.length > 0) setBookIndex(id, 0, entries.length);
    });

    // ── Arrow buttons ──────────────────────────────────────────────────────
    container.addEventListener('click', e => {
      const arrow = e.target.closest('.stage-arrow');
      if (!arrow) return;
      const catSlug = arrow.dataset.cat;
      const entries = entriesByCategory[categories.find(c=>slug(c)===catSlug)] || [];
      const dir     = arrow.classList.contains('stage-arrow--next') ? 1 : -1;
      navigateBook(catSlug, dir, entries.length);
    });

    // ── Dots ───────────────────────────────────────────────────────────────
    container.addEventListener('click', e => {
      const dot = e.target.closest('.dot');
      if (!dot) return;
      const catSlug = dot.dataset.cat;
      const i       = parseInt(dot.dataset.i, 10);
      const entries = entriesByCategory[categories.find(c=>slug(c)===catSlug)] || [];
      setBookIndex(catSlug, i, entries.length);
    });

    // ── Swipe (horizontal) ────────────────────────────────────────────────
    let touchStartX = null, touchStartY = null;
    container.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    container.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        // horizontal swipe — find visible slide
        const slide = getVisibleSlide();
        if (!slide) return;
        const catSlug = slide.dataset.slug;
        const cat     = categories.find(c => slug(c) === catSlug);
        const entries = entriesByCategory[cat] || [];
        if (entries.length > 1) navigateBook(catSlug, dx < 0 ? 1 : -1, entries.length);
      }
      touchStartX = null; touchStartY = null;
    }, { passive: true });

    // ── Scroll observer (update header) ───────────────────────────────────
    const slides = container.querySelectorAll('.category-slide');
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
          const idx = parseInt(entry.target.dataset.catIdx, 10);
          categoryIndex = idx;
          updateHeaderProgress(idx, total, categories[idx]);
          updateDropdownActive(idx);
          populateSlideDescriptions(entry.target);
        }
      });
    }, { root: container, threshold: 0.5 });

    slides.forEach(s => io.observe(s));

    // ── Dropdown toggle ────────────────────────────────────────────────────
    navBtn.addEventListener('click', e => {
      e.stopPropagation();
      const open = navDropdown.classList.toggle('open');
      navBtn.setAttribute('aria-expanded', String(open));
      navBtn.classList.toggle('open', open);
    });

    document.addEventListener('click', () => closeDropdown());

    navDropdown.addEventListener('click', e => {
      const item = e.target.closest('.header__dropdown-item');
      if (!item) return;
      const idx  = parseInt(item.dataset.catIdx, 10);
      const slide = document.getElementById('slide-'+item.dataset.slug);
      if (slide) slide.scrollIntoView({ behavior: 'smooth' });
      closeDropdown();
    });
  }

  // ── Book navigation ───────────────────────────────────────────────────────

  function navigateBook(catSlug, dir, total) {
    const cur  = slideBookIndex[catSlug] || 0;
    const next = Math.max(0, Math.min(total - 1, cur + dir));
    setBookIndex(catSlug, next, total);
  }

  function setBookIndex(catSlug, idx, total) {
    slideBookIndex[catSlug] = idx;
    const track = document.getElementById('track-'+catSlug);
    if (track) track.style.transform = `translateX(-${idx * 100}%)`;

    // Update dots
    const dots = document.querySelectorAll(`#dots-${catSlug} .dot`);
    dots.forEach((d,i) => d.classList.toggle('active', i === idx));

    // Update arrows
    const slide = document.getElementById(`slide-${catSlug}`);
    if (slide) {
      const prev = slide.querySelector('.stage-arrow--prev');
      const next = slide.querySelector('.stage-arrow--next');
      if (prev) { if (idx === 0) prev.setAttribute('disabled',''); else prev.removeAttribute('disabled'); }
      if (next) { if (idx === total - 1) next.setAttribute('disabled',''); else next.removeAttribute('disabled'); }
    }
  }

  // ── Header helpers ────────────────────────────────────────────────────────

  function updateHeaderProgress(idx, total, cat) {
    document.getElementById('headerProgress').textContent = (idx+1)+' / '+total;
    document.getElementById('navBtnLabel').textContent = cat
      ? cat
      : 'Jump to category…';
  }

  function updateDropdownActive(idx) {
    document.querySelectorAll('.header__dropdown-item').forEach((el,i) => {
      el.classList.toggle('active', i === idx);
    });
  }

  function closeDropdown() {
    document.getElementById('navDropdown').classList.remove('open');
    document.getElementById('navBtn').classList.remove('open');
    document.getElementById('navBtn').setAttribute('aria-expanded','false');
  }

  function getVisibleSlide() {
    return document.querySelector('.category-slide[data-cat-idx="'+categoryIndex+'"]');
  }

  // ── Cover fallback ────────────────────────────────────────────────────────

  document.getElementById('scrollContainer').addEventListener('error', e => {
    const img = e.target;
    if (!img.classList || !img.classList.contains('syndetics-cover')) return;
    if (img.dataset.tried !== 'mc') {
      img.dataset.tried = 'mc';
      img.src = img.dataset.mc;
    } else {
      const ph = document.createElement('div');
      ph.className = 'book-slide__cover-placeholder';
      ph.textContent = '📖';
      img.parentNode.replaceChild(ph, img);
    }
  }, true);

  // ── Sample data ───────────────────────────────────────────────────────────

  const SAMPLE_DESCRIPTIONS = {
    "9780593135204": "A lone astronaut must save the earth from disaster in this propulsive science fiction thriller. Ryland Grace wakes up on a spacecraft with no memory of how he got there — and realizes he may be humanity's last hope.",

  // ── Categories ────────────────────────────────────────────────────────────

  const categories = [
    "Read a book with a sweet treat on the cover",
    "Read a book you found on Novelist",
    "Read a book set before 1776",
    "Read a book that has a Westport connection",
    "Read a book about someone on the run",
    "Read a book that takes place in less than 10 days or more than 10 years",
    "Read a book about mistaken identity",
    "Read a book set in the wilderness",
    "Read a book about (or that gives you) an epiphany",
    "Read a book written by multiple authors",
    "Read a book that explores influencer culture",
    "Read a book that makes you feel FOMO",
    "Read a book about a character who is aging gracefully (or disgracefully)",
    "Read a book about a birth or a death",
    "Read a book about a culture clash",
    "Read a book about finding your people",
    "Read a book about family rivalry",
    "Read a book that you would take with you to a deserted island",
    "Read a survival story",
    "Read a book with a totally unhinged character",
    "Read a book that refers to another book",
    "Read a book about defying or embracing tradition",
    "Read a book based on myths and legends of yore",
    "Read a book that horrifies you",
    "Read a book that you hoped would work for a different category",
  ];

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadData() {
    if (new URLSearchParams(window.location.search).has('test')) {
      // In test mode, use dummy descriptions instead of hitting Google Books
      Object.assign(descCache, SAMPLE_DESCRIPTIONS);

      const ebc = {};
      categories.forEach(c => { ebc[c] = []; });
      SAMPLE_ROWS.forEach(r => { if (Object.prototype.hasOwnProperty.call(ebc, r[3])) ebc[r[3]].push(r); });
      render(categories, ebc);
      return;
    }

    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRGYu9wBs7mJjvQhJt-MIcBejYVeXSSPbREaslRHty3WmXRepVk7i99OqmmmoWNjoQsmXbCIBiQnwiu/pub?gid=1750986735&single=true&output=csv";
    let rawText;
    try {
      const res = await fetch(csvUrl + '&cb=' + Date.now());
      rawText = await res.text();
    } catch(err) {
      document.getElementById('scrollContainer').innerHTML =
        '<div class="status-bar"><span style="font-size:0.9rem;color:rgba(255,255,255,0.6)">Could not load submissions. Check back soon.</span></div>';
      console.error('CSV fetch error:', err);
      return;
    }

    const lines = rawText.split('\n');
    const ebc = {};
    categories.forEach(c => { ebc[c] = []; });

    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const row = parseCSVRow(line);
      if (!isPublished(row[11])) continue;
      const stars = parseInt(row[6], 10);
      if (isNaN(stars) || stars < 4) continue;
      if (!(row[4]||'').trim() || !(row[7]||'').trim()) continue;
      const cat = (row[3]||'').trim();
      if (Object.prototype.hasOwnProperty.call(ebc, cat)) ebc[cat].push(row);
    }

    render(categories, ebc);
  }

  // ── Screen navigation ─────────────────────────────────────────────────────

  function showHome() {
    document.getElementById('homeScreen').style.display = 'flex';
    document.getElementById('scrollContainer').style.display = 'none';
    document.getElementById('headerNav').style.display = 'none';
    document.getElementById('headerProgress').style.display = 'none';
    // Re-position books now that the stage has real dimensions
    requestAnimationFrame(() => {
      const stage = document.getElementById('rolodexStage');
      if (stage && stage._positionBooks) stage._positionBooks();
    });
  }

  function showCarousel(jumpToSlug) {
    document.getElementById('homeScreen').style.display = 'none';
    document.getElementById('scrollContainer').style.display = 'block';
    document.getElementById('headerNav').style.display = '';
    document.getElementById('headerProgress').style.display = '';
    if (jumpToSlug) {
      const slide = document.getElementById('slide-' + jumpToSlug);
      if (slide) slide.scrollIntoView({ behavior: 'instant' });
    }
  }

  // ── Book Shelf ───────────────────────────────────────────────────────────

  const BOOK_COLORS = [
    '#f7c948', // mango
    '#a8dde8', // mint
    '#f4a0c0', // strawberry
    '#f5e8d0', // vanilla
    '#e8c4f0', // lavender
    '#b8e8c0', // sage
  ];

  function buildWheel(categories, entriesByCategory) {
    const stage  = document.getElementById('rolodexStage');
    const nameEl = document.getElementById('rolodexName');
    const metaEl = document.getElementById('rolodexMeta');
    const wrap   = document.getElementById('rolodexWrap');
    if (!stage) return;

    const N = categories.length;

    // Shelf line
    const shelfLine = document.createElement('div');
    shelfLine.className = 'shelf-line';
    stage.appendChild(shelfLine);
    const shelfShadow = document.createElement('div');
    shelfShadow.className = 'shelf-shadow';
    stage.appendChild(shelfShadow);

  // Strip common prefixes for spine labels
  function spineLabel(cat) {
    return cat
      .replace(/^read a book (that |about |with |set |based |written |you |from )/i, '')
      .replace(/^read /i, '')
      .trim();
  }

    // Build books
    const books = categories.map((cat, i) => {
      const el = document.createElement('div');
      el.className = 'book';
      el.dataset.idx  = i;
      el.dataset.slug = slug(cat);
      const color = BOOK_COLORS[i % BOOK_COLORS.length];
      el.innerHTML = `<div class="book__inner" style="background:${color}">
        <div class="book__spine-text" data-full="${escHtml(cat)}" data-short="${escHtml(spineLabel(cat))}">${escHtml(spineLabel(cat))}</div>
      </div>`;
      stage.appendChild(el);
      return el;
    });

    let activeIdx = 0;
    let offsetX   = 0; // current drag offset in pixels, maps to book index

    function getStageW() { return stage.offsetWidth || window.innerWidth; }
    function getStageH() { return stage.offsetHeight || 300; }

    // Layout constants computed from stage size
    function getLayout() {
      const W = getStageW();
      const H = getStageH();
      const isMob = window.innerWidth < 640;
      // On mobile, drive from height so books fill the stage vertically
      const activeH = isMob
        ? Math.min(H * 0.90, 560)
        : Math.min(W * 0.38 * 1.55, 430);
      const activeW = isMob
        ? activeH / 1.55
        : Math.min(W * 0.38, 280);
      const spineW   = Math.max(36, Math.min(56, W * 0.055));
      const spineH   = Math.min(activeH * 0.88, H * 0.7);
      const centerX  = W / 2;
      return { W, H, activeW, activeH, spineW, spineH, centerX };
    }

    function xForIdx(idx) {
      const { centerX, activeW, spineW } = getLayout();
      // Active book is at center, others spread out as spines
      const gap = 4;
      // Left of center: books to the left have their right edge abutting
      // Right of center: books to the right
      const delta = idx - activeIdx;
      if (delta === 0) return centerX;
      if (delta < 0) {
        // left side — stack from active leftward
        return centerX - activeW / 2 - (spineW + gap) * (-delta - 0.5);
      } else {
        // right side
        return centerX + activeW / 2 + (spineW + gap) * (delta - 0.5);
      }
    }

    function positionBooks(dragDelta) {
      const { activeW, activeH, spineW, spineH, centerX } = getLayout();
      const bookPerPx  = 1 / (spineW + 4);
      const floatIdx   = activeIdx - dragDelta * bookPerPx;
      const nearestIdx = Math.max(0, Math.min(N - 1, Math.round(floatIdx)));
      const gap = 4;

      books.forEach((book, i) => {
        const delta    = i - floatIdx;
        const isActive = Math.abs(delta) < 0.5;

        // Fixed sizes — no interpolation so text never scrunches
        const w = isActive ? activeW : spineW;
        const h = isActive ? activeH : spineH;

        // X position based on integer distance from active
        const intDelta = i - nearestIdx;
        let x;
        if (intDelta === 0) {
          x = centerX - activeW / 2 + (floatIdx - nearestIdx) * -(spineW + gap);
        } else if (intDelta < 0) {
          x = centerX - activeW / 2 + (floatIdx - nearestIdx) * -(spineW + gap)
            - (spineW + gap) * (-intDelta);
        } else {
          x = centerX + activeW / 2 + (floatIdx - nearestIdx) * -(spineW + gap)
            + (spineW + gap) * (intDelta - 1) + gap;
        }

        const opacity = Math.max(0.2, 1 - Math.abs(delta) * 0.15);
        const zIndex  = Math.round(100 - Math.abs(delta) * 10);

        book.style.width     = w + 'px';
        book.style.height    = h + 'px';
        book.style.left      = x + 'px';
        const shelfPct = window.innerWidth < 640 ? '2%' : '18%';
        book.style.bottom    = `calc(${shelfPct} + 8px)`;
        book.style.opacity   = opacity;
        book.style.zIndex    = zIndex;
        book.style.transform = `perspective(600px) rotateY(${intDelta * -4}deg)`;
        book.classList.toggle('active', isActive);
      });

      // Update label for nearest book
      const ni  = Math.max(0, Math.min(N - 1, nearestIdx));
      const cat   = categories[ni];
      const count = (entriesByCategory[cat] || []).length;
      nameEl.textContent = cat;
      if (count === 0) {
        metaEl.textContent = 'No reviews yet';
        metaEl.className   = 'rolodex-label__meta rolodex-label__meta--empty';
      } else {
        metaEl.textContent = count + ' review' + (count > 1 ? 's' : '');
        metaEl.className   = 'rolodex-label__meta';
      }
      return nearestIdx;
    }

    function snapToIdx(idx, onDone) {
      activeIdx = Math.max(0, Math.min(N - 1, idx));
      offsetX   = 0;
      positionBooks(0);
      if (onDone) onDone();
    }

    // Initial render
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        positionBooks(0);
      });
    });

    // Expose for showHome to re-trigger after visibility
    stage._positionBooks = () => positionBooks(0);

    window.addEventListener('resize', () => positionBooks(0));


    // Click book
    stage.addEventListener('click', e => {
      const book = e.target.closest('.book');
      if (!book) return;
      const idx = parseInt(book.dataset.idx, 10);
      if (idx === activeIdx) {
        showCarousel(book.dataset.slug);
      } else {
        activeIdx = idx;
        positionBooks(0);
      }
    });

    // Drag
    let dragStart = null, dragCurrent = 0, lastX = null, lastT = null, velX = 0;
    let rafId = null;

    function onDragStart(x) {
      dragStart   = x;
      dragCurrent = 0;
      lastX = x; lastT = Date.now(); velX = 0;
      if (rafId) cancelAnimationFrame(rafId);
      stage.classList.add('dragging');
    }

    function onDragMove(x) {
      if (dragStart === null) return;
      const now = Date.now();
      velX = (x - lastX) / (now - lastT + 1);
      lastX = x; lastT = now;
      dragCurrent = x - dragStart;
      const nearIdx = positionBooks(dragCurrent);
    }

    function onDragEnd() {
      if (dragStart === null) return;
      const startIdx = activeIdx;
      dragStart = null;
      stage.classList.remove('dragging');

      // Momentum flick
      const { spineW } = getLayout();
      const pxPerBook = spineW + 4;
      let v = velX * 1.5;
      let acc = dragCurrent;

      function momentum() {
        if (Math.abs(v) < 0.3) {
          // Snap to nearest
          const nearIdx = Math.max(0, Math.min(N - 1,
            Math.round(startIdx - acc / pxPerBook)));
          snapToIdx(nearIdx);
          return;
        }
        acc += v;
        v *= 0.88;
        const nearIdx = positionBooks(acc);
        rafId = requestAnimationFrame(momentum);
      }
      rafId = requestAnimationFrame(momentum);
    }

    stage.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), { passive: true });
    stage.addEventListener('touchmove',  e => { e.preventDefault(); onDragMove(e.touches[0].clientX); }, { passive: false });
    stage.addEventListener('touchend',   onDragEnd);
    stage.addEventListener('mousedown',  e => onDragStart(e.clientX));
    window.addEventListener('mousemove', e => { if (dragStart !== null) onDragMove(e.clientX); });
    window.addEventListener('mouseup',   onDragEnd);

    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      activeIdx = Math.max(0, Math.min(N - 1, activeIdx + (e.deltaY > 0 ? 1 : -1)));
      positionBooks(0);
    }, { passive: false });
  }

  document.getElementById('homeBtn').addEventListener('click', showHome);

  loadData();
</script>
