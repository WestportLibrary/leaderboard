<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Community Picks — Summer Reading Challenge 2026 | Westport Library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;600;700;900&family=Open+Sans:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8VJ1NHYPKQ"></script>

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8VJ1NHYPKQ');

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #00a8a8;
      --teal-dark:  #0c6980;
      --bg:         #bd2f92;
      --bg-dark:    #9e2079;
      --mango:      #f7c948;
      --mint:       #a8dde8;
      --strawberry: #f4a0c0;
      --vanilla:    #f5e8d0;
      --text:       #ffffff;
      --muted:      rgba(255,255,255,0.6);
      --faint:      rgba(255,255,255,0.25);
      --header-h:   56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Open Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a { color: inherit; text-decoration: none; }

    /* ─── HEADER ─────────────────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: calc(var(--header-h) + env(safe-area-inset-top, 0px));
      background: var(--teal-dark);
      display: flex;
      align-items: flex-end;
      padding-bottom: 8px;
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: max(20px, env(safe-area-inset-left, 0px));
      padding-right: max(20px, env(safe-area-inset-right, 0px));
      gap: 14px;
      z-index: 300;
      border-bottom: 2px solid rgba(0,0,0,0.2);
    }

    /* ─── WORDMARK AS BUTTON ─────────────────────────────────────── */
    .header__wordmark {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      line-height: 1;
      flex-shrink: 0;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }

    .header__wordmark span {
      display: block;
      font-weight: 400;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1px;
    }

    /* ─── HOME SCREEN ────────────────────────────────────────────── */
    .home-screen {
      position: fixed;
      top: calc(var(--header-h) + env(safe-area-inset-top, 0px));
      left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .home-screen__top {
      text-align: center;
      flex-shrink: 0;
      padding: clamp(10px, 1.5vh, 32px) 24px clamp(6px, 1vh, 16px);
    }

    .home-screen__eyebrow {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    .home-screen__headline {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 6vw, 4rem);
      line-height: 1.0;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .home-screen__tagline {
      font-size: clamp(0.78rem, 1.6vw, 0.95rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ─── BOOK SHELF ────────────────────────────────────────────── */
    .rolodex-wrap {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .rolodex-label {
      flex-shrink: 0;
      text-align: center;
      padding: 0 24px clamp(6px, 1.2vh, 16px);
      z-index: 20;
    }

    .rolodex-label__name {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: clamp(0.95rem, 3vw, 2rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 2px;
      min-height: 2.4em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .rolodex-label__meta {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mango);
      margin-bottom: 8px;
    }

    .rolodex-label__tap {
      font-family: 'Catamaran', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }

    .rolodex-label__hint { display: none; }

    .rolodex-stage {
      flex: 1;
      width: 100%;
      min-height: 0;
      position: relative;
      cursor: grab;
      overflow: hidden;
    }

    .rolodex-stage.dragging { cursor: grabbing; }

    .shelf-line {
      position: absolute;
      bottom: calc(18% - 16px);
      left: 0; right: 0;
      height: 30px;
      background: linear-gradient(to bottom,
        rgba(255,255,255,0.06) 0%,
        rgba(140,80,25,0.45) 20%,
        rgba(90,45,10,0.65) 40%,
        rgba(60,28,5,0.78) 55%,
        rgba(40,15,0,0.65) 75%,
        rgba(20,5,0,0.35) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    .shelf-shadow {
      position: absolute;
      bottom: calc(18% - 28px);
      left: 0; right: 0;
      height: 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
      z-index: 1;
      pointer-events: none;
    }

    .shelf-face { display: none; }

    /* Individual book */
    .book {
      position: absolute;
      bottom: calc(18% + 14px);
      transform-origin: center bottom;
      user-select: none;
      -webkit-user-select: none;
      z-index: 3;
      cursor: pointer;
    }

    .book__inner {
      width: 100%;
      height: 100%;
      border-radius: 2px 4px 4px 2px;
      overflow: hidden;
      position: relative;
      box-shadow:
        3px 6px 20px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Binding groove */
    .book__binding {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: linear-gradient(to right, rgba(0,0,0,0.45), rgba(0,0,0,0.08));
      z-index: 2;
      pointer-events: none;
    }

    /* Page edge */
    .book__page-edge {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 5px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.07) 0px,
        rgba(255,255,255,0.07) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 2;
      pointer-events: none;
    }

    /* Decorative rules on spine */
    .book__rule {
      position: absolute;
      left: 8px; right: 8px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      z-index: 2;
      pointer-events: none;
    }
    .book__rule--top { top: 8px; }
    .book__rule--bot { display: none; }

    /* Library spine label */
    .book__label {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #f5f0e0;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 1px;
      padding: 2px 3px;
      min-width: 18px;
      max-width: calc(100% - 8px);
      text-align: center;
      z-index: 3;
      pointer-events: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    .book__label span {
      display: block;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 6px;
      line-height: 1.3;
      color: #1a1a1a;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .book.active .book__label { display: none; }

    /* Spine text for non-active books */
    .book__spine-text {
      position: absolute;
      inset: 14px 0 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
    }

    .book__spine-inner {
      transform: rotate(90deg);
      white-space: normal;
      word-break: break-word;
      text-align: center;
      width: var(--spine-avail-h, 120px);
      font-family: 'Catamaran', sans-serif;
      font-weight: 800;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      line-height: 1.25;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* Face-out content — hidden on spine books */
    .book__face-content {
      display: none;
      position: absolute;
      inset: 14px 8px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 6px;
      z-index: 1;
    }

    .book__face-label {
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: clamp(0.55rem, 0.9vw, 0.68rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .book__face-rule {
      width: 28px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    .book__face-title {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: clamp(0.9rem, 1.8vw, 1.3rem);
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.9);
    }

    .book__face-count {
      font-family: 'Catamaran', sans-serif;
      font-weight: 600;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* Active book faces out */
    .book.active .book__inner {
      border-radius: 2px 5px 5px 2px;
      box-shadow:
        -5px 0 0 rgba(0,0,0,0.3),
        8px 16px 40px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .book.active .book__spine-text {
      display: none;
    }

    .book.active .book__face-content {
      display: flex;
    }

    .book.active .book__page-edge {
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.1) 0px,
        rgba(255,255,255,0.1) 1px,
        transparent 1px,
        transparent 3px
      );
    }

    @keyframes swipe-hint {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-18px); }
      50%  { transform: translateX(12px); }
      75%  { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    .book.active.swipe-hint {
      animation: swipe-hint 0.9s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
    }

    @media (min-width: 641px) {
      .book.active.swipe-hint { animation: none; }
    }

    /* ─── COVER THUMBNAIL OVERLAY ────────────────────────────────── */
    .book-slide__thumb {
      position: absolute;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      height: 32vh; /* ends just above the 50% text zone */
      width: auto;
      border-radius: 3px 6px 6px 3px;
      box-shadow:
        -4px 0 0 rgba(0,0,0,0.25),
        8px 14px 36px rgba(0,0,0,0.75);
      display: block;
      object-fit: cover;
    }

    .book-slide__thumb-placeholder {
      position: absolute;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      height: 32vh;
      aspect-ratio: 2/3;
      border-radius: 3px 6px 6px 3px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    /* ─── READ MORE ───────────────────────────────────────────────── */
    .book-slide__read-more {
      background: none;
      border: none;
      color: var(--mint);
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 2px 0;
      display: block;
      text-align: right;
      align-self: flex-end;
    }

    .book-slide__read-more:hover { opacity: 0.75; }
    .book-slide__description {
      font-size: clamp(0.82rem, 1.4vw, 0.95rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-top: -4px;
    }

    .book-slide__description-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-slide__description-text.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }

    /* ─── ALSO USED FOR ──────────────────────────────────────────── */
    .book-slide__also {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 4px;
    }

    .book-slide__also strong {
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      display: block;
      margin-bottom: 2px;
      font-family: 'Catamaran', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── MOBILE DESCRIPTION MODAL ───────────────────────────────── */
    .desc-modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      backdrop-filter: blur(4px);
    }

    .desc-modal-backdrop.open { display: block; }

    .desc-modal {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1a1a24;
      border-radius: 16px 16px 0 0;
      padding: 24px 24px 40px;
      z-index: 501;
      max-height: 75vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .desc-modal-backdrop.open .desc-modal {
      transform: translateY(0);
    }

    .desc-modal__handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .desc-modal__title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 6px;
    }

    .desc-modal__author {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    .desc-modal__text {
      font-size: 0.9rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.8);
    }

    .desc-modal__close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Catamaran', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
    }

    .header__sep {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    /* Category dropdown */
    .header__nav {
      position: relative;
      flex: 1;
    }

    .header__nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 6px 12px;
      color: #fff;
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      width: 100%;
      transition: background 0.15s;
    }

    #navBtnLabel {
      overflow: hidden;
      text-overflow: clip;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .header__nav-btn:hover { background: rgba(255,255,255,0.18); }

    .header__nav-btn .chevron {
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .header__nav-btn.open .chevron { transform: rotate(180deg); }

    .header__dropdown {
      position: fixed;
      top: calc(var(--header-h) + env(safe-area-inset-top, 0px) + 4px);
      left: 16px;
      right: 16px;
      max-width: 640px;
      max-height: 60vh;
      overflow-y: auto;
      background: var(--teal-dark);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      z-index: 400;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    .header__dropdown.open { display: block; }

    .header__dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.1s;
      gap: 12px;
    }

    .header__dropdown-item:last-child { border-bottom: none; }
    .header__dropdown-item:hover { background: rgba(255,255,255,0.1); }
    .header__dropdown-item.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
    }

    .header__dropdown-item .di-count {
      font-size: 0.68rem;
      color: var(--faint);
      flex-shrink: 0;
    }

    /* Category progress indicator */
    .header__progress {
      margin-left: auto;
      font-family: 'Catamaran', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      letter-spacing: 0.06em;
    }

    /* ─── MAIN SCROLL CONTAINER ──────────────────────────────────── */
    .scroll-container {
      position: fixed;
      top: calc(var(--header-h) + env(safe-area-inset-top, 0px));
      left: 0; right: 0;
      bottom: 0;
      overflow: hidden;
      scrollbar-width: none;
    }

    .scroll-container::-webkit-scrollbar { display: none; }

    /* ─── CATEGORY SLIDE ─────────────────────────────────────────── */
    .category-slide {
      height: calc(100vh - var(--header-h) - env(safe-area-inset-top, 0px));
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Gradient background shift per category using ice cream colors */
    .category-slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,0,0,0.18) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── CATEGORY LABEL (inside book info) ─────────────────────── */
    .book-slide__category {
      font-family: 'Catamaran', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }

    /* ─── BOOK STAGE ─────────────────────────────────────────────── */
    .book-stage {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ─── BOOK DOTS (absolute overlay) ──────────────────────────── */
    .book-dots {
      position: absolute;
      bottom: 44px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 20;
      pointer-events: none;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
      pointer-events: all;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ─── SCROLL HINT (absolute overlay) ────────────────────────── */
    .scroll-hint { display: none; }

    /* Arrow buttons */
    .stage-arrow {
      position: absolute;
      top: 22%;
      transform: translateY(-50%);
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      flex-shrink: 0;
    }

    .stage-arrow:hover { background: rgba(0,0,0,0.65); }
    .stage-arrow[disabled] { opacity: 0.2; pointer-events: none; }
    .stage-arrow--prev { left: 12px; }
    .stage-arrow--next { right: 12px; }

    /* Book viewport (clips the sliding books) */
    .book-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .book-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* ─── SINGLE BOOK CARD ───────────────────────────────────────── */
    /* ─── BOOK SLIDE — full bleed overlay ───────────────────────── */
    .book-slide {
      flex-shrink: 0;
      width: 100%;
      min-width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .book-slide__cover-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
    }

    .book-slide__cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.75);
    }

    .book-slide__cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
      opacity: 0.15;
    }

    /* Gradient overlay */
    .book-slide__cover-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.96) 0%,
        rgba(0,0,0,0.95) 50%,
        rgba(0,0,0,0.75) 72%,
        rgba(0,0,0,0.4) 88%,
        transparent 100%
      );
      pointer-events: none;
    }

    /* Text overlay sits above gradient */
    .book-slide__info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 44%; /* text zone covers 60% of the slide */
      padding: clamp(16px, 2vh, 32px) clamp(24px, 5vw, 72px) clamp(20px, 3vh, 40px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: clamp(6px, 1vh, 14px);
      z-index: 2;
      overflow: hidden;
    }

    .book-slide__stars {
      display: flex;
      gap: 4px;
    }

    .star {
      font-size: clamp(0.9rem, 1.4vw, 1.2rem);
      line-height: 1;
    }
    .star--filled { color: var(--mango); }
    .star--empty  { color: rgba(255,255,255,0.2); }

    /* Title + borrow pill on same line */
    .book-slide__title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .book-slide__title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3.5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #fff;
      min-width: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-slide__catalog {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      background: var(--teal);
      border-radius: 20px;
      padding: clamp(5px, 0.6vh, 8px) clamp(12px, 1.5vw, 20px);
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: clamp(0.68rem, 0.9vw, 0.88rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      transition: background 0.15s;
      line-height: 1;
    }

    .catalog-mobile { display: none; }
    .catalog-desktop { display: contents; }

    @media (max-width: 640px) {
      .catalog-mobile { display: contents; }
      .catalog-desktop { display: none; }
    }

    .book-slide__catalog:hover { background: var(--teal-dark); }


    .book-slide__author {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 1.6vw, 1.4rem);
      color: rgba(255,255,255,0.6);
    }

    .book-slide__catalog {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      background: var(--teal);
      border-radius: 20px;
      padding: clamp(5px, 0.6vh, 8px) clamp(12px, 1.5vw, 20px);
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: clamp(0.68rem, 0.9vw, 0.88rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      transition: background 0.15s;
      line-height: 1;
    }

    /* Desktop: pill next to author, hide from title row */

    @media (max-width: 640px) {
      /* Mobile: pill next to title, hide from author row */
    }

    .book-slide__description-inline {
      font-size: clamp(0.82rem, 1.3vw, 1rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─── SCROLLABLE REVIEWS ─────────────────────────────────────── */
    .book-slide__reviews {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
      position: relative;
      /* Fade at bottom to hint more content */
      -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }

    .book-slide__reviews::-webkit-scrollbar {
      width: 3px;
    }

    .book-slide__reviews::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
    }
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .book-slide__review-block + .book-slide__review-block {
      margin-top: 4px;

    .book-slide__review {
      font-size: clamp(0.88rem, 1.4vw, 1.1rem);
      font-style: italic;

    .book-slide__patron {
      font-family: 'Catamaran', sans-serif;
      font-size: clamp(0.62rem, 0.8vw, 0.78rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* ─── ALSO USED FOR ──────────────────────────────────────────── */
    .book-slide__also {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);

      padding-top: 6px;

    .book-slide__also strong {

      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .book-slide__category {
      font-family: 'Catamaran', sans-serif;
      font-size: clamp(0.6rem, 0.85vw, 0.78rem);

      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ─── PLACEHOLDER SLIDE ──────────────────────────────────────── */
    .placeholder-slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;

    .placeholder-slide__icon { font-size: 2.5rem; opacity: 0.4; }

    .placeholder-slide__text {
      font-size: 0.85rem;

    }

    .placeholder-slide__text a {
      color: rgba(255,255,255,0.7);
      text-decoration: underline;
    }

    /* ─── STATUS ─────────────────────────────────────────────────── */
    .status-bar {
      height: calc(100vh - var(--header-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;

    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── MOBILE ADJUSTMENTS ─────────────────────────────────────── */
    @media (max-width: 640px) {
      /* Overlay layout — mobile typography */
      .book-slide__info {
        top: 40%;
        padding: 10px 16px 16px;
        gap: 5px;
        overflow: hidden;
      }

      .book-slide__title {
        font-size: clamp(1.2rem, 5vw, 1.8rem);

      }

      /* Arrows — indicators only, no tap */
      .stage-arrow {
        pointer-events: none;

        top: 40%;
        transform: translateY(-50%);
        width: 32px;
        height: 32px;

      }
      .stage-arrow--prev { left: 4px; }

      /* Home screen */
      .home-screen__eyebrow { display: none; }
      .home-screen__headline { display: none; }
      .home-screen__tagline {
        font-size: 0.78rem;
        line-height: 1.45;
        color: rgba(255,255,255,0.7);
        margin-top: 2px;
        text-align: left;
      }
      .home-screen__top {
        padding: 4px 16px;
      }
      .home-screen__top { padding: 8px 16px 4px; }
      .rolodex-label { padding: 0 16px 4px; }
      .rolodex-label__name { font-size: clamp(0.9rem, 4vw, 1.2rem); }
      .book__face-title { font-size: clamp(0.9rem, 4.5vw, 1.2rem); }
      .rolodex-label__hint { display: none; }
      .shelf-line, .shelf-shadow, .shelf-face { bottom: 35%; }
      .shelf-face { bottom: calc(35% - 10px); }
      .shelf-shadow { bottom: calc(35% - 18px); }
      .book { bottom: calc(35% + 14px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .book-track { transition: none; }
      .scroll-hint { animation: none; }
      .spinner { animation: none; }
    }

    /* ─── DESKTOP DROPDOWN WIDTH ─────────────────────────────────── */
    @media (min-width: 768px) {
      .header__dropdown {
        left: 16px;
        right: auto;
        width: 560px;
        max-width: calc(100vw - 32px);
      }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
<header class="header">
  <button class="header__wordmark" id="homeBtn" aria-label="Go to home screen">
    <span>Summer Reading Challenge 2026</span>
    Community Picks
  </button>
  <div class="header__sep"></div>
  <div class="header__nav" id="headerNav" style="display:none">
    <button class="header__nav-btn" id="navBtn" aria-haspopup="listbox" aria-expanded="false">
      <span id="navBtnLabel">Jump to category…</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header__dropdown" id="navDropdown" role="listbox"></div>
  </div>
  <div class="header__progress" id="headerProgress" style="display:none"></div>

<!-- ─── HOME SCREEN ───────────────────────────────────────────────────── -->
<div class="home-screen" id="homeScreen">
  <div class="home-screen__top">
    <h1 class="home-screen__headline">Community<br>Picks</h1>
    <p class="home-screen__tagline">Stuck on a challenge? Browse top-rated books submitted by other readers for ideas.</p>
  </div>
  <div class="rolodex-wrap" id="rolodexWrap">
    <div class="rolodex-label" id="rolodexLabel">
      <div class="rolodex-label__name" id="rolodexName">—</div>
      <div class="rolodex-label__meta" id="rolodexMeta"></div>
    </div>
    <div class="rolodex-stage" id="rolodexStage"></div>

<!-- ─── DESCRIPTION MODAL (mobile) ───────────────────────────────────── -->
<div class="desc-modal-backdrop" id="descModalBackdrop">
  <div class="desc-modal" id="descModal">
    <div class="desc-modal__handle"></div>
    <button class="desc-modal__close" id="descModalClose" aria-label="Close">✕</button>
    <div class="desc-modal__title" id="descModalTitle"></div>
    <div class="desc-modal__author" id="descModalAuthor"></div>
    <div class="desc-modal__text" id="descModalText"></div>
  </div>
</div>

<!-- ─── SCROLL CONTAINER ──────────────────────────────────────────────── -->
<div class="scroll-container" id="scrollContainer" style="display:none">
  <div class="status-bar">
    <div class="spinner"></div>
    <span style="font-size:0.85rem">Loading community picks…</span>
  </div>
</div>

<script>
  // ── Utilities ─────────────────────────────────────────────────────────────

  function parseCSVRow(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  }

  function isPublished(val) {
    if (!val) return false;
    return ['TRUE','1','YES'].includes(String(val).trim().toUpperCase());
  }

  function formatDisplayName(n) {
    if (!n) return 'Anonymous';
    const p = n.trim().split(/\s+/);
    return p.length === 1 ? p[0] : p[0] + ' ' + p[p.length-1][0].toUpperCase() + '.';
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function slug(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  function starsHTML(n) {
    let h = '<div class="book-slide__stars" aria-label="'+n+' out of 5 stars">';
    for (let i=1;i<=5;i++) h+='<span class="star '+(i<=n?'star--filled':'star--empty')+'">★</span>';
    return h+'</div>';
  }

  // ── State ─────────────────────────────────────────────────────────────────

  let categoryIndex = 0;   // which category slide is in view
  const slideBookIndex = {}; // categorySlug → current book index

  // ── Build HTML ────────────────────────────────────────────────────────────

  // ── Syndetics description cache ──────────────────────────────────────────
  const descCache = {};

  async function fetchDescription(isbn, title, author) {
    if (!isbn) return null;
    if (descCache[isbn] !== undefined) return descCache[isbn];

    try {
      const url = `https://westportlibrary.org/reading-challenge/syndetics-proxy.php?isbn=${encodeURIComponent(isbn)}`;
      const res  = await fetch(url);
      if (!res.ok) { descCache[isbn] = null; return null; }
      const html = await res.text();

      // Strip HTML tags and normalise whitespace
      const tmp  = document.createElement('div');
      tmp.innerHTML = html;
      const text = (tmp.textContent || tmp.innerText || '').trim().replace(/\s+/g, ' ');

      descCache[isbn] = text || null;
      return descCache[isbn];
    } catch {
      descCache[isbn] = null;
      return null;
    }
  }

  // ── Build cross-challenge index: isbn → [categories] ─────────────────────
  function buildIsbnIndex(categories, entriesByCategory) {
    const index = {}; // isbn → Set of category names
    categories.forEach(cat => {
      (entriesByCategory[cat] || []).forEach(row => {
        const isbn = (row[8] || '').trim();
        if (!isbn) return;
        if (!index[isbn]) index[isbn] = new Set();
        index[isbn].add(cat);
      });
    });
    return index;
  }

  function buildBookSlide(rows, catName, isbnIndex) {
    // rows is now an array — use first entry for book-level data
    const row    = Array.isArray(rows) ? rows[0] : rows;
    const allRows = Array.isArray(rows) ? rows : [rows];
    const title   = row[4] || '';
    const author  = row[5] || '';
    const stars   = parseInt(row[6],10) || 0;
    const review  = row[7] || '';
    const isbn    = (row[8]||'').trim();
    const catalog = (row[10]||'').trim();
    const patron  = formatDisplayName(row[2]);

    const coverUrl = (row[9] || '').trim();
    // Use stored cover URL if available, otherwise derive from ISBN
    const lc = coverUrl
      ? coverUrl.replace('MC.GIF', 'LC.GIF')
      : isbn
        ? `https://secure.syndetics.com/index.aspx?isbn=${encodeURIComponent(isbn)}/LC.GIF&client=westportpl&upc=&oclc=`
        : null;
    const mc = lc ? lc.replace('LC.GIF', 'MC.GIF') : null;

    const coverHTML = lc
      ? `<img class="book-slide__cover syndetics-cover" src="${lc}" data-mc="${mc}" alt="${escHtml(title)} cover" loading="lazy"/>`
      : `<div class="book-slide__cover-placeholder">📖</div>`;

    const catalogBtn = catalog
      ? `<a class="book-slide__catalog" href="${escHtml(catalog)}" target="_blank" rel="noopener">Borrow it</a>`
      : '';

    // Cross-challenge usage
    let alsoHTML = '';
    if (isbn && isbnIndex && isbnIndex[isbn]) {
      const others = [...isbnIndex[isbn]].filter(c => c !== catName);
      if (others.length > 0) {
        alsoHTML = `<div class="book-slide__also">
          <strong>Also used for</strong>
          ${others.map(c => escHtml(c)).join('<br>')}
        </div>`;
      }
    }

    // Description placeholder — will be populated async
    const descId = `desc-${isbn || Math.random().toString(36).slice(2)}`;
    const descHTML = `<div class="book-slide__description-inline book-slide__description" id="${descId}" data-isbn="${escHtml(isbn)}" data-title="${escHtml(title)}" data-author="${escHtml(author)}"></div>`;

    const thumbHTML = lc
      ? `<img class="book-slide__thumb syndetics-thumb" src="${lc}" data-mc="${mc}" alt="" aria-hidden="true" loading="lazy"/>`
      : `<div class="book-slide__thumb-placeholder" aria-hidden="true">📖</div>`;

    return `<article class="book-slide">
      <div class="book-slide__cover-wrap">${coverHTML}</div>
      ${thumbHTML}
      <div class="book-slide__info">
        <div class="book-slide__category">${escHtml(catName)}</div>
        ${starsHTML(stars)}
        <div class="book-slide__title-row">
          <div class="book-slide__title">${escHtml(title)}</div>
          ${catalogBtn ? `<span class="catalog-mobile">${catalogBtn}</span>` : ''}
        </div>
        <div class="book-slide__author">${escHtml(author)}</div>
        ${catalogBtn ? `<span class="catalog-desktop">${catalogBtn}</span>` : ''}
        ${descHTML}
        <div class="book-slide__reviews">
          ${allRows.map((r, ri) => `
            <div class="book-slide__review-block">
              ${allRows.length > 1 ? starsHTML(parseInt(r[6],10) || 0) : ''}
              <p class="book-slide__review" data-review="${escHtml(r[7]||'')}" data-title="${escHtml(title)}" data-author="${escHtml(author)}">${escHtml(r[7]||'')}</p>
              <div class="book-slide__patron">— ${escHtml(formatDisplayName(r[2]))}</div>
            </div>`).join('')}
        </div>
        ${alsoHTML}
      </div>
    </article>`;
  }

  const EDITION_MARKERS = /large\s*print|unabridged|a\s*novel|a\s*memoir|anniversary|revised|edition|reprint|omnibus|illustrated|graphic\s*novel/i;

  function groupEntriesByISBN(entries) {
    const groups = [];
    const seen   = {};
    entries.forEach(row => {
      // Strip subtitle only if it looks like an edition marker, not a series title
      const rawTitle = (row[4] || '').trim();
      const parts    = rawTitle.split(/[:\-\(]/);
      const coreTitle = (parts.length > 1 && EDITION_MARKERS.test(parts.slice(1).join('')))
        ? parts[0].toLowerCase().replace(/[^a-z0-9]/g, '')
        : rawTitle.toLowerCase().replace(/[^a-z0-9]/g, '');
      // Handle both "First Last" and "Last, First" author formats
      const rawAuthor = (row[5] || '').trim();
      const lastName  = rawAuthor.includes(',')
        ? rawAuthor.split(',')[0].trim().toLowerCase().replace(/[^a-z0-9]/g, '')
        : rawAuthor.split(/\s+/).pop().toLowerCase().replace(/[^a-z0-9]/g, '');
      const key = coreTitle + '|' + lastName;
      if (seen[key] !== undefined) {
        groups[seen[key]].push(row);
      } else {
        seen[key] = groups.length;
        groups.push([row]);
      }
    });
    return groups;
  }

  function buildCategorySlide(cat, entries, catIdx, totalCats, isbnIndex) {
    const id      = slug(cat);
    const isLast  = catIdx === totalCats - 1;
    const groups  = groupEntriesByISBN(entries);

    let stageContent;
    if (entries.length === 0) {
      stageContent = `<div class="placeholder-slide">
        <div class="placeholder-slide__icon">🍦</div>
        <div class="placeholder-slide__text">No 4- or 5-star reviews yet for this category.<br>
          <a href="/reading-challenge/submit.html">Be the first to submit one!</a></div>
      </div>`;
    } else {
      const booksHTML = groups.map(g => buildBookSlide(g, cat, isbnIndex)).join('');
      stageContent = `
        <button class="stage-arrow stage-arrow--prev" data-cat="${id}" aria-label="Previous book" disabled>&#8592;</button>
        <div class="book-viewport">
          <div class="book-track" id="track-${id}">${booksHTML}</div>
        </div>
        <button class="stage-arrow stage-arrow--next" data-cat="${id}" aria-label="Next book" ${groups.length<=1?'disabled':''}>&#8594;</button>`;
    }

    const dotsHTML = groups.length > 1
      ? '<div class="book-dots" id="dots-'+id+'">'
        + groups.map((_,i) => `<span class="dot${i===0?' active':''}" data-cat="${id}" data-i="${i}"></span>`).join('')
        + '</div>'
      : '';

    const scrollHint = '';

    return `<section class="category-slide" id="slide-${id}" data-slug="${id}" data-cat-idx="${catIdx}">
      <div class="book-stage">${stageContent}</div>
      ${dotsHTML}
      ${scrollHint}
    </section>`;
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render(categories, entriesByCategory) {
    const container = document.getElementById('scrollContainer');
    const total     = categories.length;

    // Build cross-challenge ISBN index
    const isbnIndex = buildIsbnIndex(categories, entriesByCategory);

    // Build group counts (grouped by ISBN) for navigation
    const groupCounts = {};
    categories.forEach(cat => {
      groupCounts[cat] = groupEntriesByISBN(entriesByCategory[cat] || []).length;
    });

    // Build slides
    let html = '';
    categories.forEach((cat, i) => {
      html += buildCategorySlide(cat, entriesByCategory[cat]||[], i, total, isbnIndex);
    });
    container.innerHTML = html;

    // Build dropdown
    const dropdown = document.getElementById('navDropdown');
    dropdown.innerHTML = categories.map((cat, i) => {
      const count = (entriesByCategory[cat]||[]).length;
      return `<div class="header__dropdown-item${i===0?' active':''}"
        role="option" data-cat-idx="${i}" data-slug="${slug(cat)}">
        <span>${escHtml(cat)}</span>
        <span class="di-count">${count > 0 ? count+' review'+(count>1?'s':'') : '—'}</span>
      </div>`;
    }).join('');

    updateHeaderProgress(0, total, categories[0]);
    attachEvents(categories, entriesByCategory, total, groupCounts);
    buildWheel(categories, entriesByCategory);
    showHome();

    // Populate descriptions from Syndetics as slides are viewed
    populateDescriptions();
  }

  // ── Populate descriptions for a specific slide ───────────────────────────

  const populatedSlugs = new Set();

  function populateSlideDescriptions(slideEl) {
    if (!slideEl) return;
    const id = slideEl.id;
    if (populatedSlugs.has(id)) return;
    populatedSlugs.add(id);

    // Mobile: tapping the review opens the bottom sheet with review + description
    if (window.innerWidth < 640) {
      slideEl.querySelectorAll('.book-slide__review').forEach(reviewEl => {
        reviewEl.style.cursor = 'pointer';
        reviewEl.addEventListener('click', () => {
          const title  = reviewEl.dataset.title;
          const author = reviewEl.dataset.author;
          const review = reviewEl.dataset.review;
          const desc   = descCache[reviewEl.closest('.book-slide')?.querySelector('.book-slide__description')?.dataset?.isbn || ''] || '';
          document.getElementById('descModalTitle').textContent  = title;
          document.getElementById('descModalAuthor').textContent = author;
          document.getElementById('descModalText').textContent   = (desc ? desc + '\n\n' : '') + '"' + review + '"';
          document.getElementById('descModalBackdrop').classList.add('open');
        });
      });
    }

    const els = slideEl.querySelectorAll('.book-slide__description');
    // Stagger requests 300ms apart to avoid rate limiting
    els.forEach((el, i) => {
      setTimeout(() => {
        const isbn   = el.dataset.isbn;
        const title  = el.dataset.title;
        const author = el.dataset.author;
        if (!isbn && !title) return;

        fetchDescription(isbn, title, author).then(desc => {
          if (!desc) { el.style.display = 'none'; return; }

          el.textContent = desc;

          const btn = document.createElement('button');
          btn.className   = 'book-slide__read-more';
          btn.textContent = 'Read more';
          el.after(btn);

          btn.addEventListener('click', () => {
            if (window.innerWidth < 640) {
              document.getElementById('descModalTitle').textContent  = title;
              document.getElementById('descModalAuthor').textContent = author;
              document.getElementById('descModalText').textContent   = desc;
              document.getElementById('descModalBackdrop').classList.add('open');
            } else {
              const expanded = el.classList.toggle('expanded');
              if (expanded) {
                el.style.webkitLineClamp = 'unset';
                el.style.display = 'block';
                btn.textContent = 'Show less';
              } else {
                el.style.webkitLineClamp = '';
                el.style.display = '';
                btn.textContent = 'Read more';
              }
            }
          });

          if (window.innerWidth >= 640) {
            setTimeout(() => {
              if (el.scrollHeight <= el.clientHeight + 2) btn.style.display = 'none';
            }, 500);
          }
        });
      }, i * 300);
    });
  }

  function populateDescriptions() {
    // Populate first slide immediately
    const firstSlide = document.querySelector('.category-slide');
    populateSlideDescriptions(firstSlide);

    // Modal close handlers
    const backdrop = document.getElementById('descModalBackdrop');
    document.getElementById('descModalClose').addEventListener('click', () => {
      backdrop.classList.remove('open');
    });
    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) backdrop.classList.remove('open');
    });
  }

  // ── Events ────────────────────────────────────────────────────────────────

  function attachEvents(categories, entriesByCategory, total, groupCounts) {
    const container = document.getElementById('scrollContainer');
    const navBtn    = document.getElementById('navBtn');
    const navDropdown = document.getElementById('navDropdown');

    // Init book indices and sync arrow states
    categories.forEach(cat => {
      const id = slug(cat);
      const entries = entriesByCategory[cat] || [];
      slideBookIndex[id] = 0;
      if (entries.length > 0) setBookIndex(id, 0, groupCounts[cat] || entries.length);
    });

    // ── Arrow buttons ──────────────────────────────────────────────────────
    container.addEventListener('click', e => {
      const arrow = e.target.closest('.stage-arrow');
      if (!arrow) return;
      const catSlug = arrow.dataset.cat;
      const entries = entriesByCategory[categories.find(c=>slug(c)===catSlug)] || [];
      const dir     = arrow.classList.contains('stage-arrow--next') ? 1 : -1;
      navigateBook(catSlug, dir, (groupCounts[categories.find(c => slug(c) === catSlug)] || entries.length));
    });

    // ── Dots ───────────────────────────────────────────────────────────────
    container.addEventListener('click', e => {
      const dot = e.target.closest('.dot');
      if (!dot) return;
      const catSlug = dot.dataset.cat;
      const i       = parseInt(dot.dataset.i, 10);
      const entries = entriesByCategory[categories.find(c=>slug(c)===catSlug)] || [];
      setBookIndex(catSlug, i, (groupCounts[categories.find(c => slug(c) === catSlug)] || entries.length));
    });

    // ── Horizontal swipe for books ────────────────────────────────────────
    let touchStartX = null, touchStartY = null;

    container.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    container.addEventListener('touchmove', e => {
      if (touchStartX === null) return;
      const dx = Math.abs(e.touches[0].clientX - touchStartX);
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      if (dx > dy + 4) e.preventDefault(); // lock to horizontal
    }, { passive: false });

    container.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) + 4 && Math.abs(dx) > 40) {
        const slide = getVisibleSlide();
        if (!slide) return;
        const catSlug = slide.dataset.slug;
        const cat     = categories.find(c => slug(c) === catSlug);
        const entries = entriesByCategory[cat] || [];
        if (entries.length > 1) navigateBook(catSlug, dx < 0 ? 1 : -1, (groupCounts[categories.find(c => slug(c) === catSlug)] || entries.length));
      }
      touchStartX = null; touchStartY = null;
    }, { passive: true });

    // ── Scroll observer (update header) ───────────────────────────────────
    const slides = container.querySelectorAll('.category-slide');
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
          const idx = parseInt(entry.target.dataset.catIdx, 10);
          categoryIndex = idx;
          updateHeaderProgress(idx, total, categories[idx]);
          updateDropdownActive(idx);
          populateSlideDescriptions(entry.target);
        }
      });
    }, { root: container, threshold: 0.5 });

    slides.forEach(s => io.observe(s));

    // ── Dropdown toggle ────────────────────────────────────────────────────
    navBtn.addEventListener('click', e => {
      e.stopPropagation();
      const open = navDropdown.classList.toggle('open');
      navBtn.setAttribute('aria-expanded', String(open));
      navBtn.classList.toggle('open', open);
    });

    document.addEventListener('click', () => closeDropdown());

    navDropdown.addEventListener('click', e => {
      const item = e.target.closest('.header__dropdown-item');
      if (!item) return;
      const container = document.getElementById('scrollContainer');
      const slide = document.getElementById('slide-'+item.dataset.slug);
      if (slide) container.scrollTop = slide.offsetTop;
      closeDropdown();
    });
  }

  // ── Book navigation ───────────────────────────────────────────────────────

  function navigateBook(catSlug, dir, total) {
    const cur  = slideBookIndex[catSlug] || 0;
    const next = Math.max(0, Math.min(total - 1, cur + dir));
    setBookIndex(catSlug, next, total);
  }

  function setBookIndex(catSlug, idx, total) {
    slideBookIndex[catSlug] = idx;
    const track = document.getElementById('track-'+catSlug);
    if (track) track.style.transform = `translateX(-${idx * 100}%)`;

    // Update dots
    const dots = document.querySelectorAll(`#dots-${catSlug} .dot`);
    dots.forEach((d,i) => d.classList.toggle('active', i === idx));

    // Update arrows
    const slide = document.getElementById(`slide-${catSlug}`);
    if (slide) {
      const prev = slide.querySelector('.stage-arrow--prev');
      const next = slide.querySelector('.stage-arrow--next');
      if (prev) { if (idx === 0) prev.setAttribute('disabled',''); else prev.removeAttribute('disabled'); }
      if (next) { if (idx === total - 1) next.setAttribute('disabled',''); else next.removeAttribute('disabled'); }
    }
  }

  // ── Header helpers ────────────────────────────────────────────────────────

  function truncateAtWord(str, maxLen) {
    if (str.length <= maxLen) return str;
    const trimmed = str.slice(0, maxLen);
    const lastSpace = trimmed.lastIndexOf(' ');
    return (lastSpace > 0 ? trimmed.slice(0, lastSpace) : trimmed) + '…';
  }

  function updateHeaderProgress(idx, total, cat) {
    document.getElementById('headerProgress').textContent = (idx+1)+' / '+total;
    const label = document.getElementById('navBtnLabel');
    if (cat) {
      // Truncate at word boundary based on available button width
      const btn = document.getElementById('navBtn');
      const maxChars = Math.floor((btn.offsetWidth - 40) / 7); // rough char width estimate
      label.textContent = truncateAtWord(cat, Math.max(20, maxChars));
      label.title = cat; // full text on hover
    } else {
      label.textContent = 'Jump to category…';
    }
  }

  function updateDropdownActive(idx) {
    document.querySelectorAll('.header__dropdown-item').forEach((el,i) => {
      el.classList.toggle('active', i === idx);
    });
  }

  function closeDropdown() {
    document.getElementById('navDropdown').classList.remove('open');
    document.getElementById('navBtn').classList.remove('open');
    document.getElementById('navBtn').setAttribute('aria-expanded','false');
  }

  function getVisibleSlide() {
    return document.querySelector('.category-slide[data-cat-idx="'+categoryIndex+'"]');
  }

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadData() {
    if (new URLSearchParams(window.location.search).has('test')) {
      // In test mode, use dummy descriptions instead of hitting Syndetics
      Object.assign(descCache, SAMPLE_DESCRIPTIONS);

      const ebc = {};
      categories.forEach(c => { ebc[c] = []; });
      SAMPLE_ROWS.forEach(r => { if (Object.prototype.hasOwnProperty.call(ebc, r[3])) ebc[r[3]].push(r); });
      render(categories, ebc);
      return;
    }

    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRGYu9wBs7mJjvQhJt-MIcBejYVeXSSPbREaslRHty3WmXRepVk7i99OqmmmoWNjoQsmXbCIBiQnwiu/pub?gid=1750986735&single=true&output=csv";
    let rawText;
    try {
      const res = await fetch(csvUrl + '&cb=' + Date.now());
      rawText = await res.text();
    } catch(err) {
      document.getElementById('scrollContainer').innerHTML =
        '<div class="status-bar"><span style="font-size:0.9rem;color:rgba(255,255,255,0.6)">Could not load submissions. Check back soon.</span></div>';
      console.error('CSV fetch error:', err);
      return;
    }

    const lines = rawText.split('\n');
    const ebc = {};
    categories.forEach(c => { ebc[c] = []; });

    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const row = parseCSVRow(line);
      if (!isPublished(row[11])) continue;
      const stars = parseInt(row[6], 10);
      if (isNaN(stars) || stars < 4) continue;
      if (!(row[4]||'').trim() || !(row[7]||'').trim() || !(row[10]||'').trim()) continue;
      const cat = (row[3]||'').trim();
      if (Object.prototype.hasOwnProperty.call(ebc, cat)) ebc[cat].push(row);
    }

    render(categories, ebc);
  }

      .trim()
      .toUpperCase();
    // Take first 3 words max, each line max 6 chars
    const words = stripped.split(/\s+/).slice(0, 4);
    const lines = [];
    let current = '';
    for (const w of words) {
      const abbr = w.slice(0, 6);
      if (current.length + abbr.length > 6 && current) {
        lines.push(current);
        current = abbr;
      } else {
        current = current ? current + ' ' + abbr : abbr;
      }
    }
    if (current) lines.push(current);
    return lines.slice(0, 3);
  }

  function spineLabel(cat) {
    return cat
      .replace(/^read a book (that |about |with |set |based |written |you |from )/i, '')
      .replace(/^read /i, '')
      .trim();
  }

    // Build books
    const books = categories.map((cat, i) => {
      const el = document.createElement('div');
      el.className = 'book';
      el.dataset.idx  = i;
      el.dataset.slug = slug(cat);
      const [top, bot, txt] = BOOK_COLORS[i % BOOK_COLORS.length];
      const short = escHtml(spineLabel(cat));
      const count = (entriesByCategory[cat] || []).length;
      const countLabel = count === 0 ? 'No reviews' : count + ' review' + (count > 1 ? 's' : '');
      const labelLines = spineLabelText(cat).map(l => `<span>${escHtml(l)}</span>`).join('');

      el.innerHTML = `
        <div class="book__inner" style="background:linear-gradient(180deg,${top} 0%,${bot} 100%)">
          <div class="book__binding"></div>
          <div class="book__page-edge"></div>
          <div class="book__rule book__rule--top"></div>
          <div class="book__spine-text"><div class="book__spine-inner" style="color:${txt}">${short}</div></div>
          <div class="book__face-content">
            <div class="book__face-label">Challenge</div>
            <div class="book__face-rule"></div>
            <div class="book__face-title">${short}</div>
            <div class="book__face-rule"></div>
            <div class="book__face-count">${countLabel}</div>
          </div>
          <div class="book__label">${labelLines}</div>
        </div>`;
      stage.appendChild(el);
      return el;
    });

    let activeIdx = 0;
    let offsetX   = 0; // current drag offset in pixels, maps to book index

    function getStageW() { return stage.offsetWidth || window.innerWidth; }
    function getStageH() { return stage.offsetHeight || 300; }

    // Layout constants computed from stage size
    function getLayout() {
      const W = getStageW();
      const H = getStageH();
      const isMob = window.innerWidth < 640;
      // Mobile: active book takes ~55% of stage height, leaving room for visible spines
      const activeH = isMob
        ? Math.min(H * 0.55, 320)
        : Math.min(W * 0.38 * 1.55, 430);
      const activeW = isMob
        ? activeH / 1.55
        : Math.min(W * 0.38, 280);
      const spineW   = Math.max(isMob ? 28 : 36, Math.min(isMob ? 40 : 56, W * 0.055));
      const spineH   = Math.min(activeH * 0.88, H * 0.7);
      const centerX  = W / 2;
      return { W, H, activeW, activeH, spineW, spineH, centerX };
    }

    function xForIdx(idx) {
      const { centerX, activeW, spineW } = getLayout();
      // Active book is at center, others spread out as spines
      const gap = 4;
      // Left of center: books to the left have their right edge abutting
      // Right of center: books to the right
      const delta = idx - activeIdx;
      if (delta === 0) return centerX;
      if (delta < 0) {
        // left side — stack from active leftward
        return centerX - activeW / 2 - (spineW + gap) * (-delta - 0.5);
      } else {
        // right side
        return centerX + activeW / 2 + (spineW + gap) * (delta - 0.5);
      }
    }

    function circDelta(i, center) {
      let d = i - center;
      while (d > N / 2) d -= N;
      while (d < -N / 2) d += N;
      return d;
    }

    function wrapIdx(idx) {
      return ((Math.round(idx) % N) + N) % N;
    }

    function positionBooks(dragDelta) {
      const { activeW, activeH, spineW, spineH, centerX } = getLayout();
      const bookPerPx  = 1 / (spineW + 4);
      const floatIdx   = activeIdx - dragDelta * bookPerPx;
      const nearestIdx = wrapIdx(floatIdx);
      const gap = 4;
      const frac = floatIdx - Math.round(floatIdx); // fractional drag offset

      books.forEach((book, i) => {
        // Circular distance from float position
        let delta = circDelta(i, floatIdx);
        const intDelta = Math.round(delta);
        const isActive = Math.abs(delta) < 0.5;

        const w = isActive ? activeW : spineW;
        const h = isActive ? activeH : spineH;

        // X position using integer circular delta, shifted by fractional drag
        let x;
        if (intDelta === 0) {
          x = centerX - activeW / 2 + frac * -(spineW + gap);
        } else if (intDelta < 0) {
          x = centerX - activeW / 2 + frac * -(spineW + gap)
            - (spineW + gap) * (-intDelta);
        } else {
          x = centerX + activeW / 2 + frac * -(spineW + gap)
            + (spineW + gap) * (intDelta - 1) + gap;
        }

        const opacity = isActive ? 1 : Math.max(0.55, 1 - Math.abs(delta) * 0.08);
        const zIndex  = Math.round(100 - Math.abs(delta) * 10);

        book.style.width     = w + 'px';
        book.style.height    = h + 'px';
        book.style.setProperty('--spine-avail-h', Math.max(40, h - 70) + 'px');
        book.style.left      = x + 'px';
        const shelfPct = window.innerWidth < 640 ? '35%' : '18%';
        book.style.bottom = `calc(${shelfPct} + 14px)`;
        book.style.opacity   = opacity;
        book.style.zIndex    = zIndex;
        book.style.transform = '';
        book.classList.toggle('active', isActive);
      });

      // Update label
      const cat   = categories[nearestIdx];
      const count = (entriesByCategory[cat] || []).length;
      nameEl.textContent = cat;
      if (count === 0) {
        metaEl.textContent = 'No reviews yet';
        metaEl.className   = 'rolodex-label__meta rolodex-label__meta--empty';
      } else {
        metaEl.textContent = count + ' review' + (count > 1 ? 's' : '');
        metaEl.className   = 'rolodex-label__meta';
      }
      return nearestIdx;
    }

    function snapToIdx(idx, onDone) {
      activeIdx = wrapIdx(idx);
      offsetX   = 0;
      positionBooks(0);
      if (onDone) onDone();
    }

    // Initial render
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        positionBooks(0);
      });
    });

    // Expose for showHome to re-trigger after visibility
    stage._positionBooks = () => positionBooks(0);

    window.addEventListener('resize', () => positionBooks(0));


    // Click book
    stage.addEventListener('click', e => {
      const book = e.target.closest('.book');
      if (!book) return;
      const idx = parseInt(book.dataset.idx, 10);
      if (idx === activeIdx) {
        showCarousel(book.dataset.slug);
      } else {
        activeIdx = idx;
        positionBooks(0);
      }
    });

    // Drag
    let dragStart = null, dragCurrent = 0, lastX = null, lastT = null, velX = 0;
    let rafId = null;

    function onDragStart(x) {
      dragStart   = x;
      dragCurrent = 0;
      lastX = x; lastT = Date.now(); velX = 0;
      if (rafId) cancelAnimationFrame(rafId);
      stage.classList.add('dragging');
    }

    function onDragMove(x) {
      if (dragStart === null) return;
      const now = Date.now();
      velX = (x - lastX) / (now - lastT + 1);
      lastX = x; lastT = now;
      dragCurrent = x - dragStart;
      const nearIdx = positionBooks(dragCurrent);
    }

    function onDragEnd() {
      if (dragStart === null) return;
      const startIdx = activeIdx;
      dragStart = null;
      stage.classList.remove('dragging');

      // Momentum flick
      const { spineW } = getLayout();
      const pxPerBook = spineW + 4;
      let v = velX * 1.5;
      let acc = dragCurrent;

      function momentum() {
        if (Math.abs(v) < 0.3) {
          // Snap to nearest
          const nearIdx = wrapIdx(startIdx - acc / pxPerBook);
          snapToIdx(nearIdx);
          return;
        }
        acc += v;
        v *= 0.88;
        const nearIdx = positionBooks(acc);
        rafId = requestAnimationFrame(momentum);
      }
      rafId = requestAnimationFrame(momentum);
    }

    stage.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), { passive: true });
    stage.addEventListener('touchmove',  e => { e.preventDefault(); onDragMove(e.touches[0].clientX); }, { passive: false });
    stage.addEventListener('touchend',   onDragEnd);
    stage.addEventListener('mousedown',  e => onDragStart(e.clientX));
    window.addEventListener('mousemove', e => { if (dragStart !== null) onDragMove(e.clientX); });
    window.addEventListener('mouseup',   onDragEnd);

    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      activeIdx = Math.max(0, Math.min(N - 1, activeIdx + (e.deltaY > 0 ? 1 : -1)));
      positionBooks(0);
    }, { passive: false });
  }

  document.getElementById('homeBtn').addEventListener('click', showHome);

  loadData();
</script>
</body>
</html>
